<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleprompter de Cifras</title>
    <style>
        :root {
            --bg: #121212;
            --bg-header: #1e1e1e;
            --bg-panel: #1a1a1a;
            --bg-songbar: #181818;
            --bg-input: #333;
            --bg-textarea: #2a2a2a;
            --bg-diagram: #222;
            --text: #e0e0e0;
            --text-muted: #aaa;
            --text-faint: #888;
            --text-faint2: #666;
            --border: #333;
            --border-input: #555;
            --chord-color: #ffb300;
        }

        body.light-theme {
            --bg: #f5f5f2;
            --bg-header: #ffffff;
            --bg-panel: #ffffff;
            --bg-songbar: #eeeeea;
            --bg-input: #ffffff;
            --bg-textarea: #ffffff;
            --bg-diagram: #f0f0ec;
            --text: #1a1a1a;
            --text-muted: #555;
            --text-faint: #777;
            --text-faint2: #888;
            --border: #ddd;
            --border-input: #ccc;
            --chord-color: #b36b00;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            padding-bottom: 130px;
            transition: background-color 0.2s, color 0.2s;
        }

        #header {
            position: relative;
            background: var(--bg-header);
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        #menuExtra {
            display: none;
            position: absolute;
            top: 100%;
            right: 10px;
            margin-top: 6px;
            background: var(--bg-header);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            flex-direction: column;
            gap: 6px;
            z-index: 150;
            box-shadow: 0 4px 14px rgba(0,0,0,0.35);
        }
        #menuExtra.show { display: flex; }
        #menuExtra button { white-space: nowrap; }

        #searchBox {
            width: 40%;
            max-width: 260px;
        }

        #searchWrap {
            position: relative;
            display: inline-block;
        }
        #searchResults {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 4px;
            max-height: 260px;
            overflow-y: auto;
            background: var(--bg-header);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.35);
            z-index: 150;
        }
        #searchResults.show { display: block; }
        #searchResults .search-result-item {
            padding: 10px 12px;
            font-size: 14px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #searchResults .search-result-item:last-child { border-bottom: none; }
        #searchResults .search-result-item:hover,
        #searchResults .search-result-item.active {
            background: var(--bg-input);
        }
        #searchResults .search-result-empty {
            padding: 10px 12px;
            font-size: 13px;
            color: var(--text-muted);
        }

        select, input[type="text"] {
            padding: 10px;
            font-size: 16px;
            background: var(--bg-input);
            color: var(--text);
            border: 1px solid var(--border-input);
            border-radius: 5px;
        }

        select { width: 40%; max-width: 260px; }

        button {
            padding: 10px 15px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }

        button:hover { background-color: #0056b3; }
        .btn-success { background-color: #28a745; }
        .btn-success:hover { background-color: #218838; }
        .btn-danger { background-color: #dc3545; }
        .btn-danger:hover { background-color: #c82333; }
        .btn-info { background-color: #17a2b8; }
        .btn-info:hover { background-color: #117a8b; }
        .btn-warning { background-color: #ffc107; color: #222; }
        .btn-warning:hover { background-color: #e0a800; }
        .btn-sm { padding: 6px 10px; font-size: 12px; }

        #songBar {
            display: none;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background: var(--bg-songbar);
            flex-wrap: wrap;
            align-items: center;
        }

        #songBar .tag {
            font-size: 12px;
            color: var(--text-faint);
        }

        #mainArea {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        #content {
            padding: 40px 20px;
            max-width: 900px;
            flex: 1 1 auto;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            font-size: 24px;
            line-height: 1.4;
            min-height: 100vh;
        }

        .chord-line {
            color: var(--chord-color);
            font-weight: bold;
        }

        .chord-tok {
            cursor: pointer;
            border-bottom: 1px dotted transparent;
            padding: 0 1px;
        }
        .chord-tok:hover, .chord-tok:active {
            border-bottom-color: currentColor;
            background: rgba(255,179,0,0.15);
            border-radius: 3px;
        }

        #chordPanel {
            display: none;
            flex: 0 0 180px;
            position: sticky;
            top: 15px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            max-height: 90vh;
            overflow-y: auto;
            flex-wrap: wrap;
            gap: 12px;
        }

        #chordPanel.show { display: flex; }

        #tomSelectorBox {
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        #tomSelector {
            width: auto;
            max-width: none;
            padding: 4px 6px;
            font-size: 13px;
            margin-left: 4px;
        }
        .btn-zoom { padding: 3px 8px; font-size: 12px; font-weight: bold; }

        #acordesGroup {
            display: inline-flex;
            align-items: center;
            gap: 0;
            border-radius: 6px;
            overflow: hidden;
        }
        #acordesGroup #btnAcordes {
            border-radius: 6px 0 0 6px;
        }
        #zoomGroup {
            display: none;
            align-items: center;
            border: 1px solid var(--text-faint2, #555);
            border-left: none;
            border-radius: 0 6px 6px 0;
            overflow: hidden;
        }
        #zoomGroup.show { display: inline-flex; }
        #zoomGroup .btn-zoom {
            border-radius: 0;
            border: none;
            border-left: 1px solid rgba(255,255,255,0.15);
        }
        #zoomGroup .btn-zoom:first-child { border-left: none; }

        .chord-diagram-box {
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }

        .chord-diagram-box svg {
            background: var(--bg-diagram);
            border-radius: 4px;
            max-width: 100%;
        }

        #chordPopup {
            display: none;
            position: fixed;
            z-index: 300;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 12px 10px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.4);
        }
        #chordPopup.show { display: block; }
        #btnFecharPopup {
            position: absolute;
            top: 4px;
            right: 4px;
            padding: 2px 8px;
            font-size: 12px;
            line-height: 1.4;
        }

        .funcao-label {
            display: inline-block;
            font-size: 10px;
            font-weight: bold;
            color: #222;
            background: var(--chord-color);
            border-radius: 8px;
            padding: 1px 6px;
            margin-left: 4px;
        }

        @media (max-width: 800px) {
            #chordPanel {
                position: static;
                flex: 1 1 100%;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                max-height: none;
            }
            .chord-diagram-box { width: 90px; }
        }

        #tapFlash {
            position: fixed;
            top: 0; left: 0; right: 0;
            text-align: center;
            padding: 6px;
            font-size: 13px;
            background: #dc3545;
            color: white;
            transform: translateY(-100%);
            transition: transform 0.25s;
            z-index: 200;
        }
        #tapFlash.show { transform: translateY(0); }

        #editorArea {
            display: none;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
            flex-direction: column;
            gap: 15px;
        }

        #novaTitulo { width: 100%; box-sizing: border-box; }

        #novaLetra {
            width: 100%;
            height: 60vh;
            background: var(--bg-textarea);
            color: var(--text);
            border: 1px solid var(--border-input);
            border-radius: 5px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
            resize: vertical;
            box-sizing: border-box;
        }

        #controls {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--bg-header);
            padding: 6px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            border-top: 1px solid var(--border);
            z-index: 100;
            flex-wrap: nowrap;
        }

        #toggleBtn {
            padding: 6px 12px;
            font-size: 12px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-size: 9px;
            color: var(--text-muted);
        }

        input[type=range] { width: 80px; height: 16px; }

        #wakeStatus {
            font-size: 11px;
            color: var(--text-faint2);
            text-align: center;
            padding: 4px;
        }
    </style>
</head>
<body>

    <div id="tapFlash">Pausado (toque na tela)</div>

    <div id="header">
        <div id="searchWrap">
            <input type="text" id="searchBox" placeholder="🔍 Buscar cifra...">
            <div id="searchResults"></div>
        </div>
        <select id="cifraSelector">
            <option value="" disabled selected>Selecione uma cifra...</option>
        </select>
        <button id="btnNovaCifra" class="btn-success">+ Nova</button>
        <button id="btnMenu" class="btn-sm">⋮</button>
        <div id="menuExtra">
            <button id="btnExportar" class="btn-info">📥 Backup JSON</button>
            <button id="btnImportar" class="btn-info">📤 Restaurar JSON</button>
            <button id="btnConfigNuvem" class="btn-info">⚙️ Nuvem</button>
            <button id="btnTema" class="btn-sm">🌙 Tema</button>
        </div>
        <input type="file" id="fileInput" accept=".json" style="display: none;">
    </div>
    <div id="syncStatus" style="text-align:center;font-size:11px;color:#666;padding:4px;"></div>

    <div id="songBar">
        <button id="btnTransposeDown" class="btn-sm">Tom -1</button>
        <span id="transposeLabel" style="font-size:12px;color:#aaa;">0</span>
        <button id="btnTransposeUp" class="btn-sm">Tom +1</button>
        <div id="acordesGroup">
            <button id="btnAcordes" class="btn-sm btn-info">🎸 Acordes</button>
            <span id="zoomGroup">
                <button id="btnZoomOut" class="btn-sm btn-zoom" title="Diminuir diagrama">−</button>
                <button id="btnZoomIn" class="btn-sm btn-zoom" title="Aumentar diagrama">+</button>
            </span>
        </div>
        <button id="btnCompacto" class="btn-sm">🗜️ Compactar</button>
        <button id="btnEditar" class="btn-sm btn-warning">✏️ Editar</button>
        <button id="btnExcluir" class="btn-sm btn-danger">🗑️ Excluir</button>
    </div>

    <div id="mainArea">
        <div id="content">Selecione uma música no menu acima ou adicione/importe novas cifras.</div>
        <div id="chordPanel"></div>
    </div>

    <div id="chordPopup"></div>

    <div id="editorArea">
        <h2 id="editorTitle">Adicionar Nova Cifra</h2>
        <input type="text" id="novaTitulo" placeholder="Digite o título da música">
        <textarea id="novaLetra" placeholder="Cole a cifra aqui..."></textarea>
        <div style="display: flex; gap: 10px;">
            <button id="btnSalvarCifra" class="btn-success">Salvar no Acervo</button>
            <button id="btnCancelar" class="btn-danger">Cancelar</button>
        </div>
    </div>

    <div id="controls">
        <button id="toggleBtn">Iniciar</button>
        <div class="control-group">
            <label>Velocidade</label>
            <input type="range" id="speed" min="1" max="100" value="15">
        </div>
        <div class="control-group">
            <label>Tam. Letra</label>
            <input type="range" id="fontSize" min="8" max="80" value="24">
        </div>
    </div>
    <div id="wakeStatus"></div>

    <script>
        // ===== Estrutura de dados =====
        // Acervo único (banco), sincronizado com a nuvem (JSONBin.io) + cache local pra funcionar offline.
        // cifra = { titulo, texto }
        let banco = JSON.parse(localStorage.getItem('bancoCache')) || [];
        let editandoIndex = null; // índice em `banco` sendo editado
        let transposeAtual = 0;
        let cloudConfig = JSON.parse(localStorage.getItem('cloudConfig')) || null; // {binId, apiKey}

        const content = document.getElementById('content');
        const editorArea = document.getElementById('editorArea');
        const editorTitle = document.getElementById('editorTitle');
        const cifraSelector = document.getElementById('cifraSelector');
        const searchBox = document.getElementById('searchBox');
        const searchResults = document.getElementById('searchResults');
        const songBar = document.getElementById('songBar');
        const btnEditar = document.getElementById('btnEditar');
        const btnExcluir = document.getElementById('btnExcluir');
        const btnTransposeUp = document.getElementById('btnTransposeUp');
        const btnTransposeDown = document.getElementById('btnTransposeDown');
        const transposeLabel = document.getElementById('transposeLabel');
        const syncStatus = document.getElementById('syncStatus');

        const btnNovaCifra = document.getElementById('btnNovaCifra');
        const btnSalvarCifra = document.getElementById('btnSalvarCifra');
        const btnCancelar = document.getElementById('btnCancelar');
        const novaTitulo = document.getElementById('novaTitulo');
        const novaLetra = document.getElementById('novaLetra');

        const btnExportar = document.getElementById('btnExportar');
        const btnImportar = document.getElementById('btnImportar');
        const fileInput = document.getElementById('fileInput');
        const btnConfigNuvem = document.getElementById('btnConfigNuvem');
        const btnAcordes = document.getElementById('btnAcordes');
        const chordPanel = document.getElementById('chordPanel');
        const chordPopup = document.getElementById('chordPopup');
        const btnZoomIn = document.getElementById('btnZoomIn');
        const btnZoomOut = document.getElementById('btnZoomOut');
        const zoomGroup = document.getElementById('zoomGroup');
        const btnCompacto = document.getElementById('btnCompacto');
        const btnTema = document.getElementById('btnTema');
        const btnMenu = document.getElementById('btnMenu');
        const menuExtra = document.getElementById('menuExtra');

        const toggleBtn = document.getElementById('toggleBtn');
        const speedInput = document.getElementById('speed');
        const fontSizeInput = document.getElementById('fontSize');
        const tapFlash = document.getElementById('tapFlash');
        const wakeStatus = document.getElementById('wakeStatus');

        let isPlaying = false;
        let animationId;
        let wakeLock = null;

        // ===== Menu recolhível (botões técnicos: backup, restaurar, nuvem, tema) =====
        btnMenu.addEventListener('click', (e) => {
            e.stopPropagation();
            menuExtra.classList.toggle('show');
        });
        document.addEventListener('click', (e) => {
            if (!menuExtra.classList.contains('show')) return;
            if (menuExtra.contains(e.target) || e.target === btnMenu) return;
            menuExtra.classList.remove('show');
        });
        // fecha o menu depois de usar qualquer botão dentro dele
        menuExtra.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') menuExtra.classList.remove('show');
        });

        // ===== Tema claro/escuro =====
        function aplicarTema(tema) {
            document.body.classList.toggle('light-theme', tema === 'light');
            btnTema.textContent = tema === 'light' ? '☀️ Tema' : '🌙 Tema';
        }
        let temaAtual = localStorage.getItem('tema') || 'dark';
        aplicarTema(temaAtual);
        btnTema.addEventListener('click', () => {
            temaAtual = temaAtual === 'light' ? 'dark' : 'light';
            localStorage.setItem('tema', temaAtual);
            aplicarTema(temaAtual);
        });

        // ===== Sincronização com a nuvem (JSONBin.io) =====
        // Estratégia: bin "manifesto" guarda só { chunkIds: [...] }.
        // O acervo em si é fatiado em N bins de dados (cada um < LIMITE_BYTES),
        // criados/apagados automaticamente conforme o acervo cresce/encolhe.
        // cloudConfig = { manifestId, apiKey }
        const LIMITE_BYTES = 90 * 1024; // margem de segurança abaixo do teto de 100kb do plano grátis

        function statusMsg(texto, cor) {
            syncStatus.textContent = texto;
            syncStatus.style.color = cor || '#666';
        }

        function tamanhoBytes(obj) {
            return new TextEncoder().encode(JSON.stringify(obj)).length;
        }

        // Agrupa as cifras em pedaços, cada um abaixo de LIMITE_BYTES
        function fatiarBanco(lista) {
            const chunks = [];
            let atual = [];
            let atualBytes = 2; // "[]"
            for (const cifra of lista) {
                const tamCifra = tamanhoBytes(cifra) + 1; // +1 da vírgula
                if (atual.length > 0 && atualBytes + tamCifra > LIMITE_BYTES) {
                    chunks.push(atual);
                    atual = [];
                    atualBytes = 2;
                }
                atual.push(cifra);
                atualBytes += tamCifra;
            }
            if (atual.length > 0) chunks.push(atual);
            return chunks;
        }

        async function jsonbinGet(id, apiKey) {
            const resp = await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, {
                headers: { 'X-Master-Key': apiKey }
            });
            if (!resp.ok) throw new Error('Falha ao buscar bin ' + id + ': ' + resp.status);
            const data = await resp.json();
            return data.record;
        }

        async function jsonbinPut(id, apiKey, dados) {
            const resp = await fetch(`https://api.jsonbin.io/v3/b/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': apiKey },
                body: JSON.stringify(dados)
            });
            if (!resp.ok) {
                const corpo = await resp.text().catch(() => '');
                throw new Error('Falha ao salvar bin ' + id + ': ' + resp.status + ' ' + corpo);
            }
        }

        async function jsonbinCreate(apiKey, dados, nome) {
            const resp = await fetch('https://api.jsonbin.io/v3/b', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': apiKey,
                    'X-Bin-Name': nome || 'telezen-chunk'
                },
                body: JSON.stringify(dados)
            });
            if (!resp.ok) {
                const corpo = await resp.text().catch(() => '');
                throw new Error('Falha ao criar bin: ' + resp.status + ' ' + corpo);
            }
            const data = await resp.json();
            return data.metadata.id;
        }

        async function jsonbinDelete(id, apiKey) {
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${id}`, {
                    method: 'DELETE',
                    headers: { 'X-Master-Key': apiKey }
                });
            } catch (e) { /* se falhar, fica órfão na conta, sem problema */ }
        }

        async function carregarNuvem() {
            if (!cloudConfig || !cloudConfig.manifestId || !cloudConfig.apiKey) {
                statusMsg('☁️ Nuvem não configurada — usando apenas cópia local. Clique em "⚙️ Nuvem" pra ativar sincronização automática.', '#e0a800');
                // primeira vez sem nada salvo: tenta puxar um repertorio.json estático, se existir
                if (banco.length === 0) {
                    try {
                        const resp = await fetch('repertorio.json', { cache: 'no-store' });
                        if (resp.ok) {
                            const dados = await resp.json();
                            if (Array.isArray(dados)) {
                                banco = dados;
                                localStorage.setItem('bancoCache', JSON.stringify(banco));
                            }
                        }
                    } catch (e) { /* sem repertorio.json, tudo bem */ }
                }
                renderizarLista();
                return;
            }
            statusMsg('⏳ Sincronizando...', '#aaa');
            try {
                const manifesto = await jsonbinGet(cloudConfig.manifestId, cloudConfig.apiKey);
                const chunkIds = (manifesto && Array.isArray(manifesto.chunkIds)) ? manifesto.chunkIds : [];
                let dados = [];
                for (const id of chunkIds) {
                    const pedaco = await jsonbinGet(id, cloudConfig.apiKey);
                    if (Array.isArray(pedaco)) dados = dados.concat(pedaco);
                }
                banco = dados;
                localStorage.setItem('bancoCache', JSON.stringify(banco));
                statusMsg('☁️ Sincronizado (' + chunkIds.length + ' pedaço(s))', '#28a745');
            } catch (e) {
                console.error('carregarNuvem erro:', e);
                statusMsg('⚠️ Sem conexão com a nuvem — mostrando última cópia salva neste aparelho', '#dc3545');
            }
            renderizarLista();
        }

        async function salvarNuvem() {
            localStorage.setItem('bancoCache', JSON.stringify(banco));
            if (!cloudConfig || !cloudConfig.manifestId || !cloudConfig.apiKey) return;
            statusMsg('⏳ Salvando na nuvem...', '#aaa');
            try {
                const manifesto = await jsonbinGet(cloudConfig.manifestId, cloudConfig.apiKey);
                let chunkIdsAntigos = (manifesto && Array.isArray(manifesto.chunkIds)) ? manifesto.chunkIds : [];
                const novosChunks = fatiarBanco(banco);

                const novosIds = [];
                for (let i = 0; i < novosChunks.length; i++) {
                    if (i < chunkIdsAntigos.length) {
                        await jsonbinPut(chunkIdsAntigos[i], cloudConfig.apiKey, novosChunks[i]);
                        novosIds.push(chunkIdsAntigos[i]);
                    } else {
                        const novoId = await jsonbinCreate(cloudConfig.apiKey, novosChunks[i], 'telezen-chunk-' + i);
                        novosIds.push(novoId);
                    }
                }
                // apaga bins de pedaço que sobraram (acervo encolheu)
                for (let i = novosChunks.length; i < chunkIdsAntigos.length; i++) {
                    await jsonbinDelete(chunkIdsAntigos[i], cloudConfig.apiKey);
                }

                await jsonbinPut(cloudConfig.manifestId, cloudConfig.apiKey, { chunkIds: novosIds });
                statusMsg('☁️ Sincronizado (' + novosIds.length + ' pedaço(s))', '#28a745');
            } catch (e) {
                console.error('salvarNuvem erro:', e);
                statusMsg('⚠️ Não foi possível salvar na nuvem agora (salvo só neste aparelho por enquanto)', '#dc3545');
            }
        }

        btnConfigNuvem.addEventListener('click', () => {
            const manifestIdAtual = cloudConfig ? cloudConfig.manifestId : '';
            const apiKeyAtual = cloudConfig ? cloudConfig.apiKey : '';
            const manifestId = prompt(
                'Cole o Bin ID do bin MANIFESTO no jsonbin.io (crie uma conta grátis em jsonbin.io, faça UM Bin novo com conteúdo {"chunkIds":[]} e copie o ID — os demais bins de dados são criados automaticamente):',
                manifestIdAtual
            );
            if (manifestId === null) return;
            const apiKey = prompt('Cole sua X-Master-Key do jsonbin.io (em "API Keys" no painel):', apiKeyAtual);
            if (apiKey === null) return;
            if (!manifestId.trim() || !apiKey.trim()) {
                cloudConfig = null;
                localStorage.removeItem('cloudConfig');
                statusMsg('☁️ Nuvem desativada', '#666');
                return;
            }
            cloudConfig = { manifestId: manifestId.trim(), apiKey: apiKey.trim() };
            localStorage.setItem('cloudConfig', JSON.stringify(cloudConfig));
            if (confirm('Configuração salva. Deseja enviar seu acervo atual (' + banco.length + ' cifra(s)) pra nuvem agora, sobrescrevendo o que estiver lá?')) {
                salvarNuvem();
            } else {
                carregarNuvem();
            }
        });

        function renderizarLista(filtro = '') {
            const termo = filtro.trim().toLowerCase();
            const ordenado = banco
                .map((c, i) => ({ titulo: c.titulo, texto: c.texto, idx: i }))
                .sort((a, b) => a.titulo.localeCompare(b.titulo, 'pt-BR'));
            cifraSelector.innerHTML = '<option value="" disabled selected>Selecione uma cifra...</option>';
            ordenado.forEach((cifra) => {
                if (termo && !cifra.titulo.toLowerCase().includes(termo)) return;
                const option = document.createElement('option');
                option.value = cifra.idx;
                option.textContent = cifra.titulo;
                cifraSelector.appendChild(option);
            });
        }

        searchBox.addEventListener('input', (e) => {
            renderizarLista(e.target.value);
            renderizarResultadosBusca(e.target.value);
        });

        function renderizarResultadosBusca(filtro = '') {
            const termo = filtro.trim().toLowerCase();
            if (!termo) {
                searchResults.classList.remove('show');
                searchResults.innerHTML = '';
                return;
            }
            const encontrados = banco
                .map((c, i) => ({ titulo: c.titulo, idx: i }))
                .filter(c => c.titulo.toLowerCase().includes(termo))
                .sort((a, b) => a.titulo.localeCompare(b.titulo, 'pt-BR'));

            if (encontrados.length === 0) {
                searchResults.innerHTML = '<div class="search-result-empty">Nenhuma cifra encontrada</div>';
            } else {
                searchResults.innerHTML = encontrados.map(c =>
                    `<div class="search-result-item" data-idx="${c.idx}">${escapeHtml(c.titulo)}</div>`
                ).join('');
            }
            searchResults.classList.add('show');
        }

        searchResults.addEventListener('click', (e) => {
            const item = e.target.closest('.search-result-item[data-idx]');
            if (!item) return;
            cifraSelector.value = item.dataset.idx;
            cifraSelector.dispatchEvent(new Event('change'));
            searchBox.value = '';
            renderizarLista('');
            searchResults.classList.remove('show');
            searchResults.innerHTML = '';
        });

        searchBox.addEventListener('focus', () => {
            if (searchBox.value.trim()) renderizarResultadosBusca(searchBox.value);
        });

        document.addEventListener('click', (e) => {
            if (!searchResults.classList.contains('show')) return;
            if (e.target === searchBox || searchResults.contains(e.target)) return;
            searchResults.classList.remove('show');
        });

        // ===== Detecção e destaque de linhas de acorde =====
        const CHORD_TOKEN = /^[A-G](#|b)?(maj|min|mM|dim|aug|sus|add|m)?\d{0,2}([#b]\d{1,2})?(\(\s*[#b]?\d{1,2}(\s*,\s*[#b]?\d{1,2})*\s*\))?(\/[A-G](#|b)?)?$/;


        function ehLinhaDeAcordes(linha) {
            const trimmed = linha.trim();
            if (!trimmed) return false;
            const tokens = trimmed.split(/\s+/);
            if (tokens.length === 0) return false;
            const validos = tokens.filter(t => CHORD_TOKEN.test(t));
            return validos.length / tokens.length >= 0.8;
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ===== Transposição =====
        const NOTAS_SUSTENIDO = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const NOTAS_BEMOL = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];

        function transporChord(token, semitons) {
            const m = token.match(/^([A-G])(#|b)?(.*)$/);
            if (!m) return token;
            const [, letra, acidente, resto] = m;
            const notaOriginal = letra + (acidente || '');
            const usaSustenido = acidente !== 'b';
            let idx = NOTAS_SUSTENIDO.indexOf(notaOriginal);
            if (idx === -1) idx = NOTAS_BEMOL.indexOf(notaOriginal);
            if (idx === -1) return token;
            let novoIdx = (idx + semitons + 12) % 12;
            const novaNota = usaSustenido ? NOTAS_SUSTENIDO[novoIdx] : NOTAS_BEMOL[novoIdx];
            return novaNota + resto;
        }

        // ===== Diagramas de acorde: variações (aberto, pestana em E, pestana em A) =====
        // Convenção de cordas 6->1: E A D G B e (grave pra aguda)
        const OPEN_SEMI = [4, 9, 2, 7, 11, 4]; // semitons de cada corda solta (C=0)

        // Formatos abertos conhecidos (frets absolutos, -1 = corda presa/muda, 0 = corda solta)
        const OPEN_SHAPES = {
            'C':     [-1, 3, 2, 0, 1, 0],
            'Cmaj7': [-1, 3, 2, 0, 0, 0],
            'C7':    [-1, 3, 2, 3, 1, 0],
            'D':     [-1, -1, 0, 2, 3, 2],
            'Dm':    [-1, -1, 0, 2, 3, 1],
            'D7':    [-1, -1, 0, 2, 1, 2],
            'E':     [0, 2, 2, 1, 0, 0],
            'Em':    [0, 2, 2, 0, 0, 0],
            'E7':    [0, 2, 0, 1, 0, 0],
            'Emaj7': [0, 2, 1, 1, 0, 0],
            'G':     [3, 2, 0, 0, 0, 3],
            'G7':    [3, 2, 0, 0, 0, 1],
            'A':     [-1, 0, 2, 2, 2, 0],
            'Am':    [-1, 0, 2, 2, 1, 0],
            'Am7':   [-1, 0, 2, 0, 1, 0],
            'Amaj7': [-1, 0, 2, 1, 2, 0],
            'A7':    [-1, 0, 2, 0, 2, 0],
            'B7':    [-1, 2, 1, 2, 0, 2]
        };

        // Formatos de pestana (relativos à casa da pestana), 6->1
        const BARRE_E = {
            '':     [0, 2, 2, 1, 0, 0],
            'm':    [0, 2, 2, 0, 0, 0],
            '7':    [0, 2, 0, 1, 0, 0],
            'm7':   [0, 2, 0, 0, 0, 0],
            'maj7': [0, 2, 1, 1, 0, 0],
            'sus4': [0, 2, 2, 2, 0, 0]
        };
        const BARRE_A = {
            '':     [-1, 0, 2, 2, 2, 0],
            'm':    [-1, 0, 2, 2, 1, 0],
            '7':    [-1, 0, 2, 0, 2, 0],
            'm7':   [-1, 0, 2, 0, 1, 0],
            'maj7': [-1, 0, 2, 1, 2, 0],
            'sus4': [-1, 0, 2, 2, 3, 0]
        };
        const APROXIMADO = new Set(['dim', 'aug', 'sus2', 'add9', '6', '9', 'm6']);

        function normalizarQualidade(sufixo) {
            if (sufixo in BARRE_E) return sufixo;
            if (sufixo.startsWith('m') && !sufixo.startsWith('maj')) return 'm';
            return '';
        }

        function parseChordFull(token) {
            const m = token.match(/^([A-G])(#|b)?([^\/]*)/);
            if (!m) return null;
            const [, letra, acidente, sufixo] = m;
            return { nota: letra + (acidente || ''), sufixo: sufixo || '' };
        }

        function notaDaCorda(stringIdx, fretAbs) {
            if (fretAbs < 0) return 'x';
            const idx = (OPEN_SEMI[stringIdx] + fretAbs) % 12;
            return NOTAS_SUSTENIDO[idx];
        }

        // Monta a lista de variações disponíveis pra um acorde (nota + sufixo)
        function getVariacoes(nota, sufixo) {
            const variacoes = [];
            const nomeCompleto = nota + sufixo;
            const aproximado = !(sufixo in BARRE_E);
            const qualidadeReal = normalizarQualidade(sufixo);

            // 1) Aberto (se existir formato exato pra essa nota+sufixo)
            if (OPEN_SHAPES[nomeCompleto]) {
                variacoes.push({ tipo: 'Aberto', frets: OPEN_SHAPES[nomeCompleto], start: 0, aproximado: false, raiz: nota });
            }

            let idx = NOTAS_SUSTENIDO.indexOf(nota);
            if (idx === -1) idx = NOTAS_BEMOL.indexOf(nota);
            if (idx === -1) idx = 0;

            // 2) Pestana com base no formato de E
            const fretE = (idx - 4 + 12) % 12;
            const shapeE = BARRE_E[qualidadeReal];
            const fretsE = shapeE.map(rel => rel < 0 ? -1 : fretE + rel);
            variacoes.push({ tipo: fretE === 0 ? 'Aberto (E)' : 'Pestana (base E)', frets: fretsE, start: fretE, aproximado, raiz: nota });

            // 3) Pestana com base no formato de A
            const fretA = (idx - 9 + 12) % 12;
            const shapeA = BARRE_A[qualidadeReal];
            const fretsA = shapeA.map(rel => rel < 0 ? -1 : fretA + rel);
            variacoes.push({ tipo: fretA === 0 ? 'Aberto (A)' : 'Pestana (base A)', frets: fretsA, start: fretA, aproximado, raiz: nota });

            return variacoes;
        }

        function gerarSVGAcorde(variacao, escala) {
            escala = escala || 1;
            const { frets, start, aproximado, raiz } = variacao;
            const raizPc = indiceNota(raiz);
            const numFrets = 4;
            const w = 120, h = 150, margin = 20;
            const stringGap = (w - 2 * margin) / 5;
            const fretGap = (h - 2 * margin - 10) / numFrets;
            const wFinal = Math.round(105 * escala);
            const hFinal = Math.round(131 * escala);

            let svg = `<svg viewBox="0 0 ${w} ${h}" width="${wFinal}" height="${hFinal}" xmlns="http://www.w3.org/2000/svg">`;

            if (start > 0) {
                svg += `<text x="${margin - 14}" y="${margin + 10}" font-size="10" fill="#aaa">${start}fr</text>`;
            }

            for (let s = 0; s < 6; s++) {
                const x = margin + s * stringGap;
                svg += `<line x1="${x}" y1="${margin}" x2="${x}" y2="${margin + numFrets * fretGap}" stroke="#888" stroke-width="1"/>`;
            }
            for (let f = 0; f <= numFrets; f++) {
                const y = margin + f * fretGap;
                const espessura = (f === 0 && start === 0) ? 3 : 1;
                svg += `<line x1="${margin}" y1="${y}" x2="${margin + 5 * stringGap}" y2="${y}" stroke="#888" stroke-width="${espessura}"/>`;
            }

            // Pestana visual quando há mais de uma corda no mesmo fret inicial (barra real)
            const naPosicaoInicial = frets.filter(f => f === start).length;
            const temBarra = start > 0 && naPosicaoInicial >= 2;
            if (temBarra) {
                const yBarra = margin + fretGap * 0.5;
                svg += `<rect x="${margin - 4}" y="${yBarra - 4}" width="${5 * stringGap + 8}" height="8" rx="4" fill="#ffb300" opacity="0.85"/>`;
            }

            frets.forEach((fretAbs, sIdx) => {
                const x = margin + sIdx * stringGap;
                if (fretAbs < 0) {
                    svg += `<text x="${x}" y="${margin - 8}" font-size="11" fill="#dc3545" text-anchor="middle">x</text>`;
                    return;
                }
                const nota = notaDaCorda(sIdx, fretAbs);
                const notaPc = indiceNota(nota);
                const funcaoNota = (raizPc !== -1 && notaPc !== -1) ? FUNCOES_INTERVALO[(notaPc - raizPc + 12) % 12] : '';

                if (start === 0 && fretAbs === 0) {
                    // corda solta
                    svg += `<circle cx="${x}" cy="${margin - 11}" r="9" fill="none" stroke="#28a745" stroke-width="1.5"/>`;
                    svg += `<text x="${x}" y="${margin - 13}" font-size="7" fill="#28a745" text-anchor="middle" font-weight="bold">${nota}</text>`;
                    svg += `<text x="${x}" y="${margin - 4}" font-size="6" fill="#28a745" text-anchor="middle">${funcaoNota}</text>`;
                    return;
                }
                if (temBarra && fretAbs === start) {
                    // coberta pela pestana - mostra nome da nota + função sobre a barra
                    const yB = margin + fretGap * 0.5;
                    svg += `<text x="${x}" y="${yB + 3}" font-size="7" fill="#3a2a00" text-anchor="middle" font-weight="bold">${nota}<tspan font-size="5" dx="1">${funcaoNota}</tspan></text>`;
                    return;
                }
                const relPos = fretAbs - start;
                const y = margin + (relPos - 0.5) * fretGap;
                svg += `<circle cx="${x}" cy="${y}" r="9" fill="#ffb300"/>`;
                svg += `<text x="${x}" y="${y - 1}" font-size="7" fill="#2a1e00" text-anchor="middle" font-weight="bold">${nota}</text>`;
                svg += `<text x="${x}" y="${y + 7}" font-size="6" fill="#2a1e00" text-anchor="middle">${funcaoNota}</text>`;
            });

            svg += `</svg>`;
            const sufixoLabel = aproximado ? ' *' : '';
            return { svg, sufixoLabel };
        }

        function extrairAcordesUnicos(texto) {
            const linhas = texto.split('\n');
            const encontrados = [];
            const vistos = new Set();
            linhas.forEach(linha => {
                if (!ehLinhaDeAcordes(linha)) return;
                linha.trim().split(/\s+/).forEach(tok => {
                    if (vistos.has(tok)) return;
                    vistos.add(tok);
                    encontrados.push(tok);
                });
            });
            return encontrados;
        }

        // Conta TODAS as ocorrências de cada acorde (não só as únicas) — usado na detecção de tom,
        // já que acordes mais frequentes (tônica, dominante) pesam mais na identificação do tom.
        function contarOcorrenciasAcordes(texto) {
            const linhas = texto.split('\n');
            const contagem = {};
            linhas.forEach(linha => {
                if (!ehLinhaDeAcordes(linha)) return;
                linha.trim().split(/\s+/).forEach(tok => {
                    contagem[tok] = (contagem[tok] || 0) + 1;
                });
            });
            return contagem;
        }

        // Guarda qual variação está sendo exibida por acorde (persiste enquanto o painel está aberto)
        let variacaoSelecionada = {};

        // ===== Função harmônica (grau/intervalo do acorde em relação ao tom) =====
        // Notação por qualidade de intervalo: J=justa, M=maior, m=menor, A=aumentada
        const FUNCOES_INTERVALO = ['1', '2m', '2M', '3m', '3M', '4J', '4A', '5J', '6m', '6M', '7m', '7M'];

        function indiceNota(nota) {
            let idx = NOTAS_SUSTENIDO.indexOf(nota);
            if (idx === -1) idx = NOTAS_BEMOL.indexOf(nota);
            return idx;
        }

        function funcaoAcorde(notaTonica, notaAcorde) {
            const idxTonica = indiceNota(notaTonica);
            const idxAcorde = indiceNota(notaAcorde);
            if (idxTonica === -1 || idxAcorde === -1) return '';
            const semitons = (idxAcorde - idxTonica + 12) % 12;
            return FUNCOES_INTERVALO[semitons];
        }

        // ===== Detecção automática de tom a partir dos próprios acordes =====
        // Graus diatônicos esperados (qualidade) por semitom de distância da tônica.
        const DIATONICO_MAIOR = { 0: 'maj', 2: 'min', 4: 'min', 5: 'maj', 7: 'maj', 9: 'min', 11: 'dim' };
        const DIATONICO_MENOR = { 0: 'min', 2: 'dim', 3: 'maj', 5: 'min', 7: 'maj', 8: 'maj', 10: 'maj' };
        // (V do tom menor aceita maior OU menor, pois é comum usar a dominante maior — menor harmônica/melódica)

        function classificarQualidade(sufixo) {
            if (/^dim/.test(sufixo)) return 'dim';
            if (/^aug/.test(sufixo)) return 'aug';
            if (/^m(?!aj)/.test(sufixo)) return 'min';
            return 'maj'; // cobre '', '7', 'maj7', 'sus4', 'add9' etc.
        }

        function detectarTom(texto) {
            const contagem = contarOcorrenciasAcordes(texto);
            const entradas = Object.entries(contagem)
                .map(([tok, count]) => {
                    const info = parseChordFull(tok);
                    if (!info) return null;
                    const rootPc = indiceNota(info.nota);
                    if (rootPc === -1) return null;
                    return { rootPc, qualidade: classificarQualidade(info.sufixo), count };
                })
                .filter(Boolean);

            if (entradas.length === 0) return 'C';

            let melhorScore = -1;
            let melhorTom = 'C';
            for (let tomPc = 0; tomPc < 12; tomPc++) {
                for (const modo of ['maior', 'menor']) {
                    const mapa = modo === 'maior' ? DIATONICO_MAIOR : DIATONICO_MENOR;
                    let score = 0;
                    entradas.forEach(({ rootPc, qualidade, count }) => {
                        const offset = (rootPc - tomPc + 12) % 12;
                        const esperada = mapa[offset];
                        if (!esperada) return; // acorde fora da escala nesse tom candidato
                        if (esperada === qualidade) {
                            score += count;
                        } else if (modo === 'menor' && offset === 7 && qualidade === 'min') {
                            // V menor (natural) também conta, com peso levemente menor que o V maior
                            score += count * 0.8;
                        }
                    });
                    if (score > melhorScore) {
                        melhorScore = score;
                        melhorTom = NOTAS_SUSTENIDO[tomPc];
                    }
                }
            }
            return melhorTom;
        }

        // Tom escolhido por música (persistido por título da cifra) — sobrepõe a detecção automática
        let tonsEscolhidos = JSON.parse(localStorage.getItem('tonsEscolhidos') || '{}');

        function obterTomAtual(cifra, tokens, semitons) {
            const titulo = cifra.titulo;
            const tomBase = tonsEscolhidos[titulo] || detectarTom(cifra.texto);
            return semitons !== 0 ? transporChord(tomBase, semitons) : tomBase;
        }

        // ===== Zoom do diagrama de acorde =====
        let escalaAcorde = parseFloat(localStorage.getItem('escalaAcorde')) || 1.3;

        function ajustarEscala(delta) {
            escalaAcorde = Math.min(2.2, Math.max(0.8, +(escalaAcorde + delta).toFixed(2)));
            localStorage.setItem('escalaAcorde', escalaAcorde);
            const cifraEscolhida = banco[cifraSelector.value];
            if (chordPanel.classList.contains('show') && cifraEscolhida) {
                renderizarPainelAcordes(cifraEscolhida.texto, transposeAtual);
            }
            if (chordPopup.classList.contains('show') && chordPopup.dataset.tokenAtual) {
                atualizarConteudoPopup(chordPopup.dataset.tokenAtual);
            }
        }
        btnZoomIn.addEventListener('click', () => ajustarEscala(0.15));
        btnZoomOut.addEventListener('click', () => ajustarEscala(-0.15));

        // Monta o HTML de uma caixa de acorde (diagrama + nome + função + navegação de variação).
        // Reaproveitado tanto no painel lateral quanto no popup individual.
        function boxAcordeHTML(tok, semitons, tomAtual) {
            const info = parseChordFull(tok);
            if (!info) return '';
            const notaTransposta = semitons !== 0 ? transporChord(info.nota, semitons) : info.nota;
            const nomeExibicao = notaTransposta + info.sufixo;
            const variacoes = getVariacoes(notaTransposta, info.sufixo);
            const funcao = funcaoAcorde(tomAtual, notaTransposta);

            if (!(tok in variacaoSelecionada) || variacaoSelecionada[tok] >= variacoes.length) {
                variacaoSelecionada[tok] = 0;
            }
            const idxAtual = variacaoSelecionada[tok];
            const { svg, sufixoLabel } = gerarSVGAcorde(variacoes[idxAtual], escalaAcorde);

            return `<div class="chord-diagram-box" data-token="${encodeURIComponent(tok)}">
                ${svg}
                <div style="font-weight:bold;">${nomeExibicao}${sufixoLabel}<span class="funcao-label">${funcao}</span></div>
                <div style="display:flex;align-items:center;justify-content:center;gap:4px;margin-top:2px;">
                    <button class="btn-sm var-prev" style="padding:2px 6px;">◀</button>
                    <span style="font-size:10px;color:#999;min-width:70px;">${variacoes[idxAtual].tipo}</span>
                    <button class="btn-sm var-next" style="padding:2px 6px;">▶</button>
                </div>
            </div>`;
        }

        function renderizarPainelAcordes(texto, semitons) {
            const cifraEscolhida = banco[cifraSelector.value];
            const tokens = extrairAcordesUnicos(texto);
            const tomAtual = cifraEscolhida ? obterTomAtual(cifraEscolhida, tokens, semitons) : 'C';

            let selectorHtml = `<div id="tomSelectorBox">Tom:
                <select id="tomSelector">
                    ${NOTAS_SUSTENIDO.map(n => `<option value="${n}" ${n === tomAtual ? 'selected' : ''}>${n}</option>`).join('')}
                </select>
            </div>`;

            let html = '';
            tokens.forEach(tok => { html += boxAcordeHTML(tok, semitons, tomAtual); });

            chordPanel.style.flexBasis = Math.max(180, 105 * escalaAcorde + 70) + 'px';
            chordPanel.innerHTML = selectorHtml + (html || '<div class="chord-diagram-box">Nenhum acorde detectado</div>');
        }

        // Troca manual do tom (dispara rerender do painel com as novas funções)
        chordPanel.addEventListener('change', (e) => {
            if (e.target.id !== 'tomSelector') return;
            const cifraEscolhida = banco[cifraSelector.value];
            if (!cifraEscolhida) return;
            tonsEscolhidos[cifraEscolhida.titulo] = e.target.value;
            localStorage.setItem('tonsEscolhidos', JSON.stringify(tonsEscolhidos));
            renderizarPainelAcordes(cifraEscolhida.texto, transposeAtual);
        });

        // Fecha o popup ao clicar fora dele (registrado ANTES do listener de navegação de variação
        // abaixo: precisa rodar primeiro, enquanto o elemento clicado ainda está no DOM — se rodasse
        // depois, o innerHTML do popup já teria sido trocado pela navegação e o clique pareceria "fora")
        document.addEventListener('click', (e) => {
            if (!chordPopup.classList.contains('show')) return;
            if (chordPopup.contains(e.target) || e.target.closest('.chord-tok')) return;
            if (e.target.closest('#btnZoomIn') || e.target.closest('#btnZoomOut')) return;
            chordPopup.classList.remove('show');
        });

        // Navegação entre variações (delegação única, cobre painel lateral E popup individual)
        document.addEventListener('click', (e) => {
            if (!e.target.classList.contains('var-next') && !e.target.classList.contains('var-prev')) return;
            const box = e.target.closest('.chord-diagram-box');
            if (!box) return;
            const chave = decodeURIComponent(box.dataset.token);
            const info = parseChordFull(chave);
            if (!info) return;

            const cifraEscolhida = banco[cifraSelector.value];
            if (!cifraEscolhida) return;
            const notaTransposta = transposeAtual !== 0 ? transporChord(info.nota, transposeAtual) : info.nota;
            const variacoes = getVariacoes(notaTransposta, info.sufixo);
            const atual = variacaoSelecionada[chave] || 0;

            if (e.target.classList.contains('var-next')) {
                variacaoSelecionada[chave] = (atual + 1) % variacoes.length;
            } else {
                variacaoSelecionada[chave] = (atual - 1 + variacoes.length) % variacoes.length;
            }

            if (box.closest('#chordPanel')) {
                renderizarPainelAcordes(cifraEscolhida.texto, transposeAtual);
            } else if (box.closest('#chordPopup')) {
                atualizarConteudoPopup(chave);
            }
        });

        btnAcordes.addEventListener('click', () => {
            chordPanel.classList.toggle('show');
            zoomGroup.classList.toggle('show', chordPanel.classList.contains('show'));
            if (chordPanel.classList.contains('show')) {
                const cifraEscolhida = banco[cifraSelector.value];
                if (cifraEscolhida) renderizarPainelAcordes(cifraEscolhida.texto, transposeAtual);
            }
        });

        // ===== Popup de acorde individual (clique num acorde direto na letra) =====
        function atualizarConteudoPopup(tok) {
            const cifraEscolhida = banco[cifraSelector.value];
            if (!cifraEscolhida) return;
            const tokensTodos = extrairAcordesUnicos(cifraEscolhida.texto);
            const tomAtual = obterTomAtual(cifraEscolhida, tokensTodos, transposeAtual);
            const boxHtml = boxAcordeHTML(tok, transposeAtual, tomAtual);
            if (!boxHtml) return;
            chordPopup.dataset.tokenAtual = tok;
            chordPopup.innerHTML = '<button id="btnFecharPopup" class="btn-sm btn-danger">✕</button>' + boxHtml;
        }

        function posicionarPopup(x, y) {
            requestAnimationFrame(() => {
                const rect = chordPopup.getBoundingClientRect();
                let left = x + 14;
                let top = y + 14;
                if (left + rect.width > window.innerWidth - 8) left = x - rect.width - 14;
                if (left < 8) left = 8;
                if (top + rect.height > window.innerHeight - 8) top = window.innerHeight - rect.height - 8;
                if (top < 8) top = 8;
                chordPopup.style.left = left + 'px';
                chordPopup.style.top = top + 'px';
            });
        }

        function abrirPopupAcorde(tok, x, y) {
            atualizarConteudoPopup(tok);
            chordPopup.classList.add('show');
            if (typeof x === 'number' && typeof y === 'number') {
                posicionarPopup(x, y);
            } else {
                requestAnimationFrame(() => {
                    const rect = chordPopup.getBoundingClientRect();
                    chordPopup.style.left = Math.max(8, (window.innerWidth - rect.width) / 2) + 'px';
                    chordPopup.style.top = Math.max(8, (window.innerHeight - rect.height) / 2) + 'px';
                });
            }
        }

        chordPopup.addEventListener('click', (e) => {
            if (e.target.id === 'btnFecharPopup') chordPopup.classList.remove('show');
        });

        // ===== Quebra de linha sincronizada (acorde junto com a palavra correspondente) =====
        // Mede a largura real de um caractere monoespaçado no tamanho de fonte atual,
        // pra saber quantos caracteres cabem numa linha antes de quebrar.
        function calcularMaxChars() {
            const estilo = getComputedStyle(content);
            const paddingH = parseFloat(estilo.paddingLeft || 0) + parseFloat(estilo.paddingRight || 0);
            const larguraDisponivel = content.clientWidth - paddingH;
            const probe = document.createElement('span');
            probe.style.fontFamily = estilo.fontFamily;
            probe.style.fontSize = estilo.fontSize;
            probe.style.position = 'absolute';
            probe.style.visibility = 'hidden';
            probe.style.whiteSpace = 'pre';
            probe.textContent = 'M'.repeat(50);
            document.body.appendChild(probe);
            const larguraChar = probe.getBoundingClientRect().width / 50;
            document.body.removeChild(probe);
            if (!larguraChar || larguraDisponivel <= 0) return 60;
            return Math.max(10, Math.floor((larguraDisponivel / larguraChar) * 0.97));
        }

        function isSpaceAt(str, idx) {
            if (idx >= str.length) return true; // além do fim da string conta como "vazio"
            return str[idx] === ' ';
        }

        // Quebra um par (linha de acorde + linha de letra) mantendo as colunas alinhadas,
        // sempre cortando num ponto onde NÃO há acorde (pra nunca partir um acorde ao meio).
        function quebrarParDeLinhas(linhaAcorde, linhaLetra, maxChars) {
            const total = Math.max(linhaAcorde.length, linhaLetra.length);
            if (total <= maxChars) return [[linhaAcorde, linhaLetra]];
            const resultado = [];
            let pos = 0;
            while (pos < total) {
                let fim = Math.min(pos + maxChars, total);
                if (fim < total) {
                    const limite = pos + Math.max(1, Math.floor(maxChars * 0.4));
                    // 1) melhor caso: ponto que é espaço em AMBAS as linhas (não corta acorde nem palavra)
                    let corteIdeal = -1;
                    for (let c = fim; c > limite; c--) {
                        if (isSpaceAt(linhaAcorde, c) && isSpaceAt(linhaLetra, c)) { corteIdeal = c; break; }
                    }
                    if (corteIdeal > limite) {
                        fim = corteIdeal;
                    } else {
                        // 2) senão, aceita espaço só na linha de acorde (nunca corta um acorde ao meio)
                        let corte = fim;
                        while (corte > limite && !isSpaceAt(linhaAcorde, corte)) corte--;
                        if (corte > limite) fim = corte;
                    }
                }
                resultado.push([linhaAcorde.slice(pos, fim), linhaLetra.slice(pos, fim)]);
                pos = fim;
                while (pos < total && isSpaceAt(linhaAcorde, pos) && isSpaceAt(linhaLetra, pos)) pos++;
            }
            return resultado;
        }

        // Quebra uma linha comum (sem par) respeitando limites de palavra
        function quebrarLinhaSimples(linha, maxChars) {
            if (linha.length <= maxChars) return [linha];
            const palavras = linha.split(' ');
            const resultado = [];
            let atual = '';
            palavras.forEach(p => {
                if (atual === '') atual = p;
                else if ((atual + ' ' + p).length <= maxChars) atual += ' ' + p;
                else { resultado.push(atual); atual = p; }
            });
            if (atual) resultado.push(atual);
            return resultado.length ? resultado : [linha];
        }

        // Modo compacto: remove linhas em branco pra aproveitar mais a tela
        let modoCompacto = localStorage.getItem('modoCompacto') === '1';

        function atualizarBotaoCompacto() {
            btnCompacto.style.backgroundColor = modoCompacto ? '#28a745' : '';
        }
        atualizarBotaoCompacto();

        btnCompacto.addEventListener('click', () => {
            modoCompacto = !modoCompacto;
            localStorage.setItem('modoCompacto', modoCompacto ? '1' : '0');
            atualizarBotaoCompacto();
            rerenderizarConteudoAtual();
        });

        function renderizarConteudo(texto, semitons) {
            let linhasOriginais = texto.split('\n');
            if (modoCompacto) {
                linhasOriginais = linhasOriginais.filter(l => l.trim() !== '');
            }
            const maxChars = calcularMaxChars();
            const linhasFinais = [];

            for (let i = 0; i < linhasOriginais.length; i++) {
                const linha = linhasOriginais[i];
                if (ehLinhaDeAcordes(linha)) {
                    const proxima = linhasOriginais[i + 1];
                    const proximaEhAcorde = proxima !== undefined && ehLinhaDeAcordes(proxima);
                    if (proxima !== undefined && !proximaEhAcorde && proxima.trim() !== '') {
                        // par acorde + letra: quebra os dois juntos, mantendo alinhamento
                        quebrarParDeLinhas(linha, proxima, maxChars).forEach(([ac, le]) => {
                            linhasFinais.push({ tipo: 'chord', texto: ac });
                            linhasFinais.push({ tipo: 'texto', texto: le });
                        });
                        i++; // já consumiu a linha de letra
                    } else {
                        // linha de acorde solta (ex: introdução instrumental)
                        quebrarLinhaSimples(linha, maxChars).forEach(l => linhasFinais.push({ tipo: 'chord', texto: l }));
                    }
                } else {
                    quebrarLinhaSimples(linha, maxChars).forEach(l => linhasFinais.push({ tipo: 'texto', texto: l }));
                }
            }

            const html = linhasFinais.map(l => {
                if (l.tipo === 'chord') {
                    const processada = l.texto.replace(/\S+/g, (tok) => {
                        const transposto = semitons !== 0 ? transporChord(tok, semitons) : tok;
                        return `<span class="chord-tok" data-chord="${encodeURIComponent(tok)}">${escapeHtml(transposto)}</span>`;
                    });
                    return '<span class="chord-line">' + processada + '</span>';
                }
                return escapeHtml(l.texto);
            }).join('\n');
            content.innerHTML = html;
        }

        function rerenderizarConteudoAtual() {
            const cifraEscolhida = banco[cifraSelector.value];
            if (cifraEscolhida) renderizarConteudo(cifraEscolhida.texto, transposeAtual);
        }

        // Re-renderiza (recalculando a quebra de linha) quando o tamanho da tela muda
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(rerenderizarConteudoAtual, 200);
        });

        // Clique num acorde dentro da letra abre o popup só daquele acorde
        content.addEventListener('click', (e) => {
            const tok = e.target.closest('.chord-tok');
            if (!tok) return;
            abrirPopupAcorde(decodeURIComponent(tok.dataset.chord), e.clientX, e.clientY);
        });

        // ===== Seleção de música =====
        cifraSelector.addEventListener('change', (e) => {
            const cifraEscolhida = banco[e.target.value];
            if (cifraEscolhida) {
                transposeAtual = 0;
                transposeLabel.textContent = '0';
                renderizarConteudo(cifraEscolhida.texto, 0);
                window.scrollTo(0, 0);
                if (isPlaying) toggleBtn.click();
                editorArea.style.display = 'none';
                content.style.display = 'block';
                songBar.style.display = 'flex';
                if (chordPanel.classList.contains('show')) renderizarPainelAcordes(cifraEscolhida.texto, 0);
            }
        });

        btnTransposeUp.addEventListener('click', () => {
            transposeAtual++;
            transposeLabel.textContent = (transposeAtual > 0 ? '+' : '') + transposeAtual;
            const cifraEscolhida = banco[cifraSelector.value];
            if (cifraEscolhida) {
                renderizarConteudo(cifraEscolhida.texto, transposeAtual);
                if (chordPanel.classList.contains('show')) renderizarPainelAcordes(cifraEscolhida.texto, transposeAtual);
            }
        });

        btnTransposeDown.addEventListener('click', () => {
            transposeAtual--;
            transposeLabel.textContent = (transposeAtual > 0 ? '+' : '') + transposeAtual;
            const cifraEscolhida = banco[cifraSelector.value];
            if (cifraEscolhida) {
                renderizarConteudo(cifraEscolhida.texto, transposeAtual);
                if (chordPanel.classList.contains('show')) renderizarPainelAcordes(cifraEscolhida.texto, transposeAtual);
            }
        });

        // ===== Novo / Editar =====
        btnNovaCifra.addEventListener('click', () => {
            editandoIndex = null;
            editorTitle.textContent = 'Adicionar Nova Cifra';
            novaTitulo.value = '';
            novaLetra.value = '';
            content.style.display = 'none';
            songBar.style.display = 'none';
            chordPanel.classList.remove('show');
            chordPopup.classList.remove('show');
            zoomGroup.classList.remove('show');
            editorArea.style.display = 'flex';
            if (isPlaying) toggleBtn.click();
        });

        btnEditar.addEventListener('click', () => {
            const idx = parseInt(cifraSelector.value);
            const cifra = banco[idx];
            if (!cifra) return;
            editandoIndex = idx;
            editorTitle.textContent = 'Editar Cifra';
            novaTitulo.value = cifra.titulo;
            novaLetra.value = cifra.texto;
            content.style.display = 'none';
            songBar.style.display = 'none';
            chordPanel.classList.remove('show');
            chordPopup.classList.remove('show');
            zoomGroup.classList.remove('show');
            editorArea.style.display = 'flex';
            if (isPlaying) toggleBtn.click();
        });

        btnExcluir.addEventListener('click', () => {
            const idx = parseInt(cifraSelector.value);
            const cifra = banco[idx];
            if (!cifra) return;
            if (!confirm('Excluir "' + cifra.titulo + '" do seu acervo?')) return;
            banco.splice(idx, 1);
            renderizarLista();
            salvarNuvem();
            content.textContent = 'Selecione uma música no menu acima ou adicione/importe novas cifras.';
            songBar.style.display = 'none';
        });

        btnCancelar.addEventListener('click', () => {
            editorArea.style.display = 'none';
            content.style.display = 'block';
            novaTitulo.value = '';
            novaLetra.value = '';
        });

        btnSalvarCifra.addEventListener('click', () => {
            const titulo = novaTitulo.value.trim();
            const texto = novaLetra.value;
            if (!titulo || !texto) {
                alert("Preencha o título e cole a cifra.");
                return;
            }
            if (editandoIndex !== null) {
                banco[editandoIndex] = { titulo, texto };
            } else {
                banco.push({ titulo, texto });
            }
            novaTitulo.value = '';
            novaLetra.value = '';
            editandoIndex = null;
            editorArea.style.display = 'none';
            content.style.display = 'block';
            renderizarLista();
            salvarNuvem();
            // seleciona a cifra recém salva
            const novoIndex = banco.findIndex(c => c.titulo === titulo);
            if (novoIndex >= 0) {
                cifraSelector.value = novoIndex;
                cifraSelector.dispatchEvent(new Event('change'));
            }
        });

        // ===== Backup / Restaurar (cópia manual, além da sincronização automática) =====
        btnExportar.addEventListener('click', () => {
            if (banco.length === 0) {
                alert("Seu acervo está vazio. Adicione cifras antes de exportar.");
                return;
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(banco, null, 4));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "meu_acervo_cifras.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        });

        btnImportar.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (event) {
                try {
                    const jsonImportado = JSON.parse(event.target.result);
                    if (Array.isArray(jsonImportado)) {
                        if (confirm('Importar ' + jsonImportado.length + ' cifra(s)? Isso vai SUBSTITUIR seu acervo atual (local e na nuvem, se configurada).')) {
                            banco = jsonImportado;
                            renderizarLista();
                            salvarNuvem();
                            alert("Acervo importado com sucesso!");
                        }
                    } else {
                        alert("Arquivo JSON inválido para este formato.");
                    }
                } catch (err) {
                    alert("Erro ao ler o arquivo JSON. Certifique-se de que é o arquivo correto.");
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        });

        // ===== Auto-scroll =====
        // OBS: scrollBy arredonda valores fracionários de px em muitos navegadores,
        // então usamos acumulador baseado em tempo real (não em contagem de frames)
        // pra ter velocidade suave e consistente, com controle fino no mínimo.
        let ultimoTimestamp = null;
        let pxAcumulado = 0;

        function pxPorSegundo(valorSlider) {
            // escala: 3px/s (bem devagar) até 220px/s (rápido), curva suave
            const min = 3, max = 220;
            const t = (valorSlider - 1) / 99; // normaliza 1..100 -> 0..1
            return min + (max - min) * Math.pow(t, 1.6);
        }

        function scrollPage(timestamp) {
            if (!isPlaying) return;
            if (ultimoTimestamp === null) ultimoTimestamp = timestamp;
            const deltaSegundos = (timestamp - ultimoTimestamp) / 1000;
            ultimoTimestamp = timestamp;

            pxAcumulado += pxPorSegundo(speedInput.value) * deltaSegundos;
            const inteiro = Math.floor(pxAcumulado);
            if (inteiro >= 1) {
                window.scrollBy(0, inteiro);
                pxAcumulado -= inteiro;
            }
            animationId = requestAnimationFrame(scrollPage);
        }

        async function ativarWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeStatus.textContent = '🔒 Tela mantida ativa';
                    wakeLock.addEventListener('release', () => {
                        wakeStatus.textContent = '';
                    });
                } else {
                    wakeStatus.textContent = '⚠️ Este navegador não suporta manter a tela ativa - ajuste o brilho/bloqueio manualmente';
                }
            } catch (err) {
                wakeStatus.textContent = '⚠️ Não foi possível manter a tela ativa';
            }
        }

        function liberarWakeLock() {
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        // Reativa o wake lock se a aba voltar ao foco durante a reprodução (comportamento padrão do browser é liberar ao trocar de aba)
        document.addEventListener('visibilitychange', () => {
            if (isPlaying && document.visibilityState === 'visible') {
                ativarWakeLock();
            }
        });

        toggleBtn.addEventListener('click', () => {
            if (editorArea.style.display === 'flex' || cifraSelector.value === "") return;
            isPlaying = !isPlaying;
            if (isPlaying) {
                toggleBtn.textContent = 'Pausar';
                toggleBtn.style.backgroundColor = '#dc3545';
                ultimoTimestamp = null;
                pxAcumulado = 0;
                animationId = requestAnimationFrame(scrollPage);
                ativarWakeLock();
            } else {
                toggleBtn.textContent = 'Iniciar';
                toggleBtn.style.backgroundColor = '#007bff';
                cancelAnimationFrame(animationId);
                liberarWakeLock();
            }
        });

        // Toque na tela alterna reprodução: pausa se estiver rolando, inicia se estiver parado.
        // Toques num acorde (que abrem o popup) não mexem na reprodução.
        content.addEventListener('click', (e) => {
            if (e.target.closest('.chord-tok')) return;
            if (editorArea.style.display === 'flex' || cifraSelector.value === "") return;
            toggleBtn.click();
            if (!isPlaying) {
                tapFlash.classList.add('show');
                setTimeout(() => tapFlash.classList.remove('show'), 1200);
            }
        });

        let fontResizeTimeout;
        fontSizeInput.addEventListener('input', (e) => {
            content.style.fontSize = e.target.value + 'px';
            clearTimeout(fontResizeTimeout);
            fontResizeTimeout = setTimeout(rerenderizarConteudoAtual, 150);
        });

        carregarNuvem();
    </script>
</body>
</html>
